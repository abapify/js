name: Auto-approve Copilot CI
# Automatically approves CI workflow runs triggered by the Copilot coding agent.
# GitHub requires manual approval before running workflows from outside collaborators
# (including the Copilot bot). This workflow runs on a schedule with repository
# permissions and approves blocked CI runs so the agent can see test results
# without human intervention.
#
# Note: A workflow_run trigger cannot be used here because GitHub propagates the
# triggering actor's approval requirement to workflow_run-triggered workflows,
# causing a circular deadlock (the auto-approve workflow itself gets blocked).
# A scheduled trigger avoids this because it runs with repository permissions
# independent of any contributor's approval status.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - name: Approve pending CI runs for Copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "/repos/${{ github.repository }}/actions/runs?status=action_required" \
            --jq '.workflow_runs[] | select(.actor.login == "Copilot") | .id' \
            | while read -r run_id; do
                echo "Approving workflow run $run_id"
                if ! gh api -X POST "/repos/${{ github.repository }}/actions/runs/${run_id}/approve"; then
                  echo "Warning: failed to approve workflow run $run_id" >&2
                fi
              done
