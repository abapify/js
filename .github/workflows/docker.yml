name: Docker

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag to build (e.g. v1.2.3), defaults to latest release'
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Release version tag to build (e.g. v1.2.3), defaults to latest release'
        required: false
        type: string

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # needed to push to GHCR
    steps:
      - name: Resolve ref
        id: resolve-ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            resolved="$INPUT_VERSION"
          else
            # Default to the ref that triggered the workflow (branch or tag)
            resolved="${{ github.ref_name }}"
          fi
          echo "Resolved ref: ${resolved}"
          echo "ref=${resolved}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve-ref.outputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
