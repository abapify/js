name: E2E BTP
on:
  # Triggered manually from the Actions tab (shows up in PR checks when run against a PR branch)
  workflow_dispatch:
  # Also runs after merge to main as a post-merge gate
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  service-key-auth:
    name: Service Key Auth Test
    runs-on: ubuntu-latest
    steps:
      # Guard against environments where the secret is unavailable (e.g. push from a fork)
      - name: Check secret availability
        id: secret-check
        env:
          SECRET: ${{ secrets.ADT_SERVICE_KEY }}
        run: |
          if [ -n "$SECRET" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ ADT_SERVICE_KEY not configured – skipping e2e test"
          fi

      - uses: actions/checkout@v6
        if: steps.secret-check.outputs.available == 'true'
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        if: steps.secret-check.outputs.available == 'true'
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        if: steps.secret-check.outputs.available == 'true'
        with:
          bun-version: 1.2.9
      - name: Install dependencies
        if: steps.secret-check.outputs.available == 'true'
        run: bun install
      - name: Build adt-cli
        if: steps.secret-check.outputs.available == 'true'
        run: npx nx build adt-cli
      - name: Test service key authentication
        if: steps.secret-check.outputs.available == 'true'
        env:
          ADT_SERVICE_KEY: ${{ secrets.ADT_SERVICE_KEY }}
        run: |
          echo "🔑 Testing BTP service key authentication..."
          npx adt --service-key="$ADT_SERVICE_KEY" info --system
          echo "✅ Service key auth e2e test passed"
