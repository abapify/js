name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag to publish (e.g. v1.2.3), defaults to latest release'
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Release version tag to publish (e.g. v1.2.3), defaults to latest release'
        required: false
        type: string

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # needed for provenance data generation
    timeout-minutes: 15
    steps:
      - name: Resolve ref
        id: resolve-ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            resolved="$INPUT_VERSION"
          else
            resolved=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName 2>/dev/null || echo "main")
          fi
          echo "Resolved ref: ${resolved}"
          echo "ref=${resolved}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve-ref.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Publish packages
        run: npx nx release publish
        shell: bash
        env:
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_ACCESS: public
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
