# SonarQube / SonarCloud configuration

# Exclude generated schema files from ALL analysis.
# These files are auto-generated by ts-xsd codegen from XSD sources and:
#   - Share structurally similar patterns by design (duplication false positives)
#   - Contain XML namespace URIs (http://www.sap.com/...) flagged as insecure http (false positives)
sonar.exclusions=\
  packages/*/src/schemas/generated/**,\
  packages/adt-plugin-abapgit/src/schemas/generated/**

# Also exclude from copy-paste detection (CPD) explicitly.
sonar.cpd.exclusions=\
  packages/*/src/schemas/generated/**,\
  packages/adt-plugin-abapgit/src/schemas/generated/**

sonar.organization=abapify
sonar.projectKey=abapify_adt-cli

